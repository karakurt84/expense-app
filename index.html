<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial=1,maximum-scale=1,user-scalable=no">
<title>Учёт расходов</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.wrap{max-width:500px;margin:0 auto;padding:16px 16px 100px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.header h1{font-size:1.5rem;font-weight:700}
.header .menu-btn{background:none;border:none;color:#94a3b8;font-size:1.5rem;cursor:pointer;padding:8px}

/* Stats cards */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat{background:#1e293b;border-radius:14px;padding:14px 16px}
.stat .label{color:#94a3b8;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat .num{font-size:1.4rem;font-weight:700}

/* Quick add form */
.add-card{background:#1e293b;border-radius:16px;padding:16px;margin-bottom:20px}
.add-card h3{font-size:.9rem;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

/* Category buttons */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;border:2px solid transparent;background:#0f172a;cursor:pointer;transition:.15s}
.cat-btn:active{transform:scale(.95)}
.cat-btn.active{border-color:#3b82f6;background:#1e3a5f}
.cat-btn .icon{font-size:1.4rem}
.cat-btn .name{font-size:.7rem;color:#94a3b8}
.cat-btn.active .name{color:#e2e8f0}

/* Amount input */
.amount-section{margin-bottom:14px}
.amount-input{width:100%;padding:16px;border-radius:12px;border:2px solid #334155;background:#0f172a;color:#f1f5f9;font-size:1.8rem;font-weight:700;text-align:center;outline:none}
.amount-input:focus{border-color:#3b82f6}
.amount-input::placeholder{color:#475569;font-size:1.2rem}

/* Quick amounts */
.quick-amounts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.quick-amt{padding:8px 14px;border-radius:20px;border:1px solid #334155;background:#0f172a;color:#94a3b8;font-size:.85rem;cursor:pointer;transition:.15s}
.quick-amt:active{background:#3b82f6;color:#fff;border-color:#3b82f6}

/* Description + Date row */
.input-row{display:flex;gap:10px;margin-bottom:14px}
.input-row .field{flex:1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.75rem;color:#64748b;font-weight:500}
.field input{padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:.95rem;width:100%}
.field input:focus{outline:none;border-color:#3b82f6}

/* Submit button */
.submit-btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s}
.submit-btn:active{transform:scale(.97);opacity:.9}
.submit-btn.success{background:linear-gradient(135deg,#22c55e,#16a34a)}

/* Charts */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.chart-box{background:#1e293b;border-radius:14px;padding:16px}
.chart-box h3{color:#94a3b8;font-size:.75rem;text-transform:uppercase;margin-bottom:10px}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:8px 14px;border-radius:20px;border:none;background:#1e293b;color:#94a3b8;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:.15s}
.filter-tab.active{background:#3b82f6;color:#fff}

/* Expense list */
.section{font-size:1rem;font-weight:600;margin-bottom:12px;color:#cbd5e1}
.list{display:flex;flex-direction:column;gap:8px}
.item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#1e293b;border-radius:12px;transition:.15s}
.item:active{background:#263548}
.item .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.item .badge{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600;white-space:nowrap}
.item .info{display:flex;flex-direction:column;gap:2px;min-width:0}
.item .desc{font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .date{color:#64748b;font-size:.75rem}
.item .right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.item .amount{font-weight:700;font-size:1rem;white-space:nowrap}
.item .del{background:none;border:none;color:#ef4444;font-size:1rem;cursor:pointer;padding:6px;border-radius:8px;opacity:.5}
.item .del:active{opacity:1;background:#ef444420}

.empty{text-align:center;color:#475569;padding:40px 0;font-size:.95rem}

/* Settings panel */
.settings-panel{display:none;background:#1e293b;border-radius:14px;padding:16px;margin-bottom:20px}
.settings-panel.open{display:block}
.settings-panel .field{margin-bottom:12px}
.settings-panel .field input{width:100%}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;font-size:.9rem;opacity:0;transition:.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
</style>
</head>

  document.getElementById('paydayIn').value=s.payday||15;
  document.getElementById('dateIn').value=new Date().toISOString().slice(0,10);
  updateUI(getExpenses(),s.salary||0,s.payday||15);
}

function saveSettings(){
  const salary=+document.getElementById('salaryIn').value||0;
  const payday=+document.getElementById('paydayIn').value||15;
  saveSettingsData({salary,payday});
  document.getElementById('settingsPanel').classList.remove('open');
  fetchData();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

function addExp(){
  const amount=+document.getElementById('amtIn').value;
  if(!amount)return;
  const dateVal=document.getElementById('dateIn').value;
  const date=dateVal?new Date(dateVal+'T00:00:00').toISOString():new Date().toISOString();
  const exp=getExpenses();
  exp.push({id:Date.now(),category:selectedCat,amount,description:document.getElementById('descIn').value.trim(),date});
  saveExpenses(exp);
  document.getElementById('amtIn').value='';
  document.getElementById('descIn').value='';
  
  const btn=document.getElementById('submitBtn');
  btn.textContent='✓ Добавлено';
  btn.classList.add('success');
  setTimeout(()=>{btn.textContent='Добавить';btn.classList.remove('success')},1000);
  
  showToast(`+${amount.toLocaleString('ru-RU')} ₽ · ${selectedCat}`);
  updateUI(getExpenses(),getSettings().salary||0,getSettings().payday||15);
  
  document.getElementById('amtIn').focus();
}

function delExp(id){
  saveExpenses(getExpenses().filter(e=>e.id!==id));
  updateUI(getExpenses(),getSettings().salary||0,getSettings().payday||15);
  showToast('Удалено');
}

function updateUI(expenses,salary,payday){
  const now=new Date();
  let filtered=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  
  if(activeFilter==='today'){
    const today=now.toISOString().slice(0,10);
    filtered=filtered.filter(e=>e.date.slice(0,10)===today);
  }else if(activeFilter==='week'){
    const weekAgo=new Date(now-7*864e5);
    filtered=filtered.filter(e=>new Date(e.date)>=weekAgo);
  }else if(activeFilter!=='all'){
    filtered=filtered.filter(e=>e.category===activeFilter);
  }
  
  const allMonth=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  const spent=allMonth.reduce((s,e)=>s+e.amount,0);
  const rem=Math.max(0, salary-spent);
  let next=new Date(now.getFullYear(),now.getMonth(),payday);
  if(now.getDate()>=payday)next.setMonth(next.getMonth()+1);
  const days=Math.ceil((next-now)/864e5);
  const daily=days?rem/days:0;

  document.getElementById('sTotal').textContent=spent.toLocaleString('ru-RU')+' ₽';
  document.getElementById('sRemain').textContent=rem.toLocaleString('ru-RU')+' ₽';
  document.getElementById('sDays').textContent=days;
  document.getElementById('sDaily').textContent=Math.round(daily).toLocaleString('ru-RU')+' ₽';

  const catMap={};
  allMonth.forEach(e=>catMap[e.category]=(catMap[e.category]||0)+e.amount);
  const labels=Object.keys(catMap),data=Object.values(catMap),colors=labels.map(l=>C[l]||'#64748b');

  if(c1)c1.destroy();
  c1=new Chart(document.getElementById('cCat'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10}}}}}});
  if(c2)c2.destroy();
  c2=new Chart(document.getElementById('cBudget'),{type:'doughnut',data:{labels:['Потрачено','Осталось'],datasets:[{data:[spent,rem],backgroundColor:['#ef4441','#4ade80'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10}}}}}});

  const el=document.getElementById('list');
  if(!filtered.length){el.innerHTML='<div class="empty">Нет расходов</div>';return}
  filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  el.innerHTML=filtered.map(e=>`<div class="item"><div class="left"><span class="badge" style="background:${C[e.category]}22;color:${C[e.category]}">${icons[e.category]||'📦'} ${e.category}</span><div class="info"><span class="desc">${e.description||'—'}</span><span class="date">${new Date(e.date).toLocaleDateString('ru-RU')}</span></div></div><div class="right"><span class="amount" style="color:${C[e.category]}">−${e.amount.toLocaleString('ru-RU')} ₽</span><button class="del" onclick="delExp(${e.id})">✕</button></div></div>`).join('');
}

fetchData();
</script>
</body>
</html>

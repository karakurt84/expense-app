<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial=1">
<title>Учёт расходов</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:24px 20px}
h1{text-align:center;font-size:2rem;margin-bottom:28px;color:#f1f5f9}

.settings{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin-bottom:28px;background:#1e293b;padding:18px 20px;border-radius:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.85rem;color:#94a3b8;font-weight:500}
.field input{padding:11px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem;width:160px}
.field input:focus{outline:none;border-color:#3b82f6}
.btn{padding:11px 24px;border-radius:10px;border:none;font-size:1rem;cursor:pointer;font-weight:600;transition:.15s}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:650px){.stats{grid-template-columns:1fr 1fr}}
.stat{background:#1e293b;border-radius:14px;padding:20px}
.stat .label{color:#94a3b8;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat .num{font-size:1.9rem;font-weight:700}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
@media(max-width:650px){.charts{grid-template-columns:1fr}}
.chart-box{background:#1e293b;border-radius:14px;padding:22px}
.chart-box h3{color:#94a3b8;font-size:.85rem;text-transform:uppercase;margin-bottom:14px}

.add-row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:28px;background:#1e293b;padding:18px 20px;border-radius:14px}
.add-row .field input,.add-row .field select{width:auto;min-width:150px}
.add-row .field select{padding:11px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem}
.add-row .field select:focus{outline:none;border-color:#3b82f6}

.section{font-size:1.15rem;font-weight:600;margin-bottom:14px;color:#cbd5e1}
.list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#1e293b;border-radius:12px}
.item .left{display:flex;align-items:center;gap:12px}
.item .badge{padding:4px 14px;border-radius:20px;font-size:.85rem;font-weight:600}
.item .desc{font-size:1rem}
.item .date{color:#64748b;font-size:.85rem}
.item .amount{font-weight:700;font-size:1.15rem}
.item .del{background:none;border:none;color:#ef4444;font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.item .del:active{background:#ef444430}
.empty{text-align:center;color:#475569;padding:50px 0;font-size:1.05rem}
</style>
</head>
<body>
<div class="wrap">
<h1>Учёт расходов</h1>

<div class="settings">
<div class="field"><label>Зарплата (₽)</label><input type="number" id="salaryIn" placeholder="50000"></div>
<div class="field"><label>День зарплаты</label><input type="number" id="paydayIn" min="1" max="28" placeholder="15"></div>
<button class="btn btn-blue" onclick="saveSettings()">Сохранить</button>
</div>

<div class="stats">
<div class="stat"><div class="label">Потрачено</div><div class="num" style="color:#f87171" id="sTotal">0 ₽</div></div>
<div class="stat"><div class="label">Осталось</div><div class="num" style="color:#4ade80" id="sRemain">0 ₽</div></div>
<div class="stat"><div class="label">Дней до зарплаты</div><div class="num" style="color:#60a5fa" id="sDays">0</div></div>
<div class="stat"><div class="label">Норма в день</div><div class="num" style="color:#fbbf24" id="sDaily">0 ₽</div></div>
</div>

<div class="charts">
<div class="chart-box"><h3>Расходы по категориям</h3><canvas id="cCat"></canvas></div>
<div class="chart-box"><h3>Бюджет на месяц</h3><canvas id="cBudget"></canvas></div>
</div>

<div class="add-row">
<div class="field"><label>Категория</label>
<select id="catIn">
<option value="Еда">🛒 Еда</option>
<option value="Транспорт">🚌 Транспорт</option>
<option value="Жильё">🏠 Жильё</option>
<option value="Развлечения">🎮 Развлечения</option>
<option value="Одежда">👔 Одежда</option>
<option value="Здоровье">💊 Здоровье</option>
<option value="Образование">📚 Образование</option>
<option value="Связь">📱 Связь</option>
<option value="Прочее">📦 Прочее</option>
</select></div>
<div class="field"><label>Сумма (₽)</label><input type="number" id="amtIn" placeholder="0"></div>
<div class="field"><label>Описание</label><input type="text" id="descIn" placeholder="Например: обед"></div>
<button class="btn btn-blue" onclick="addExp()">Добавить</button>
</div>

<div class="section">Расходы за месяц</div>
<div class="list" id="list"></div>
</div>

<script>
const C={Еда:'#f97171',Транспорт:'#3b82f6',Жильё:'#8b5cf6',Развлечения:'#ec4899',Одежда:'#14b8a6',Здоровье:'#ef4444',Образование:'#eab308',Связь:'#06b6d4',Прочее:'#64748b'};
let c1,c2;

function getSettings(){return JSON.parse(localStorage.getItem('exp_settings')||'{"salary":0,"payday":15}')}
function saveSettingsData(s){localStorage.setItem('exp_settings',JSON.stringify(s))}
function getExpenses(){return JSON.parse(localStorage.getItem('exp_list')||'[]')}
function saveExpenses(e){localStorage.setItem('exp_list',JSON.stringify(e))}

function fetchData(){
  const s=getSettings();
  document.getElementById('salaryIn').value=s.salary||'';
  document.getElementById('paydayIn').value=s.payday||15;
  updateUI(getExpenses(),s.salary||0,s.payday||15);
}

function saveSettings(){
  const salary=+document.getElementById('salaryIn').value||0;
  const payday=+document.getElementById('paydayIn').value||15;
  saveSettingsData({salary,payday});
  fetchData();
}

function addExp(){
  const amount=+document.getElementById('amtIn').value;
  if(!amount)return;
  const exp=getExpenses();
  exp.push({id:Date.now(),category:document.getElementById('catIn').value,amount,description:document.getElementById('descIn').value.trim(),date:new Date().toISOString()});
  saveExpenses(exp);
  document.getElementById('amtIn').value='';
  document.getElementById('descIn').value='';
  fetchData();
}

function delExp(id){
  saveExpenses(getExpenses().filter(e=>e.id!==id));
  fetchData();
}

function updateUI(expenses,salary,payday){
  const now=new Date();
  const cur=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  const spent=cur.reduce((s,e)=>s+e.amount,0);
  const rem=Math.max(0, salary-spent);
  let next=new Date(now.getFullYear(),now.getMonth(),payday);
  if(now.getDate()>=payday)next.setMonth(next.getMonth()+1);
  const days=Math.ceil((next-now)/864e5);
  const daily=days?rem/days:0;

  document.getElementById('sTotal').textContent=spent.toLocaleString('ru-RU')+' ₽';
  document.getElementById('sRemain').textContent=rem.toLocaleString('ru-RU')+' ₽';
  document.getElementById('sDays').textContent=days;
  document.getElementById('sDaily').textContent=Math.round(daily).toLocaleString('ru-RU')+' ₽';

  const catMap={};
  cur.forEach(e=>catMap[e.category]=(catMap[e.category]||0)+e.amount);
  const labels=Object.keys(catMap),data=Object.values(catMap),colors=labels.map(l=>C[l]||'#64748b');

  if(c1)c1.destroy();
  c1=new Chart(document.getElementById('cCat'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8'}}}}});
  if(c2)c2.destroy();
  c2=new Chart(document.getElementById('cBudget'),{type:'doughnut',data:{labels:['Потрачено','Осталось'],datasets:[{data:[spent,rem],backgroundColor:['#ef4441','#4ade80'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8'}}}}});

  const el=document.getElementById('list');
  if(!cur.length){el.innerHTML='<div class="empty">Нет расходов за этот месяц</div>';return}
  cur.sort((a,b)=>new Date(b.date)-new Date(a.date));
  el.innerHTML=cur.map(e=>`<div class="item"><div class="left"><span class="badge" style="background:${C[e.category]}22;color:${C[e.category]}">${e.category}</span><span class="desc">${e.description||'—'}</span><span class="date">${new Date(e.date).toLocaleDateString('ru-RU')}</span></div><div style="display:flex;align-items:center;gap:12px"><span class="amount" style="color:${C[e.category]}">−${e.amount.toLocaleString('ru-RU')} ₽</span><button class="del" onclick="delExp(${e.id})">✕</button></div></div>`).join('');
}

fetchData();
</script>
</body>
</html>
